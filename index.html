<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPC対戦シミュレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --bg:#181818; --surface:#222222; --surface2:#2c2c2c; --border:#3c3c3c;
    --fg:#e8e8e8; --fg-dim:#8a8a8a;
    --draw:#5a5a5a;
    --blue:#4a7dd6; --red:#d6544a;
    --mono:'Share Tech Mono',monospace; --sans:'Zen Kaku Gothic New',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100}
  header h1{font-size:18px;font-weight:900;letter-spacing:.05em;color:var(--fg)}
  header p{font-size:12px;color:var(--fg-dim);margin-top:4px;letter-spacing:.02em}
  .header-top{display:flex;flex-direction:column;gap:14px}

  .tab-bar{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tab-bar::-webkit-scrollbar{display:none}
  .tab-btn{flex-shrink:0;padding:9px 20px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--fg-dim);font:13px var(--sans);font-weight:500;cursor:pointer;transition:color .2s,border-color .2s,background .2s;white-space:nowrap}
  .tab-btn.active{color:var(--bg);border-color:var(--fg);background:var(--fg);font-weight:700}

  .panel{display:none;padding:20px;max-width:960px;margin:0 auto}
  .panel.active{display:block}

  .section-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-dim);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 22px;border-radius:5px;border:1px solid var(--fg);font:700 13px var(--sans);cursor:pointer;transition:opacity .15s,transform .1s;-webkit-tap-highlight-color:transparent}
  .btn:active{transform:scale(.98);opacity:.85}
  .btn-primary{background:var(--fg);color:#181818}
  .btn-ghost{background:none;border:1px solid var(--border);color:var(--fg-dim);padding:8px 14px;border-radius:5px;font:13px var(--sans);cursor:pointer;transition:border-color .15s,color .15s;white-space:nowrap}
  .btn-ghost:hover{border-color:var(--fg-dim);color:var(--fg)}
  .btn:disabled{opacity:.35;cursor:default}

  /* ===== LOADING ===== */
  #loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  #loading-overlay.hidden{display:none}
  .load-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--fg);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading-msg{color:var(--fg-dim);font-size:13px}

  /* ===== SIM PANEL ===== */
  .npc-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start}
  .vs-label{font:900 14px var(--sans);color:var(--fg-dim);text-align:center;padding-top:30px;letter-spacing:.1em}
  .npc-col label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;letter-spacing:.05em}
  .npc-col.blue label{color:var(--blue)}
  .npc-col.red  label{color:var(--red)}
  .select-wrapper{position:relative}
  select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--fg);font:13px var(--sans);padding:10px 32px 10px 12px;appearance:none;-webkit-appearance:none;outline:none;transition:border-color .2s;cursor:pointer}
  .npc-col.blue select:focus{border-color:var(--blue)}
  .npc-col.red  select:focus{border-color:var(--red)}
  .select-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--fg-dim);font-size:11px}
  .search-box{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--fg);font:13px var(--sans);padding:9px 12px;outline:none;margin-bottom:6px;-webkit-appearance:none}
  .search-box:focus{border-color:var(--fg)}
  .search-box::placeholder{color:var(--fg-dim)}
  .sim-action-row{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:14px;margin-bottom:24px}
  .run-status{font-size:12px;color:var(--fg-dim);margin-right:auto}

  /* ===== RESULT ===== */
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:18px;margin-bottom:16px;display:none}
  .result-card.visible{display:block}
  .win-bar-wrap{border-radius:4px;overflow:hidden;height:32px;display:flex;margin-bottom:10px;background:var(--surface2);border:1px solid var(--border)}
  .win-seg{height:100%;display:flex;align-items:center;justify-content:center;font:700 11px var(--mono);transition:width .5s cubic-bezier(.4,0,.2,1);overflow:hidden;white-space:nowrap}
  .win-seg.p1{background:var(--blue);color:#fff}
  .win-seg.draw{background:var(--draw);color:#e8e8e8}
  .win-seg.p2{background:var(--red);color:#fff}
  .bar-labels{display:flex;justify-content:space-between;font-size:11px;margin-top:4px}
  .bar-labels .lbl-p1{color:var(--blue);font-weight:700}
  .bar-labels .lbl-p2{color:var(--red);font-weight:700}
  .stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .stat-chip{flex:1;min-width:80px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:10px;text-align:center}
  .stat-chip .num{font:700 18px var(--mono);display:block;color:var(--fg)}
  .stat-chip.p1 .num{color:var(--blue)}
  .stat-chip.p2 .num{color:var(--red)}
  .stat-chip .lbl{font-size:10px;color:var(--fg-dim);margin-top:3px;letter-spacing:.04em}
  .verdict{margin-top:14px;padding:12px 14px;border-radius:4px;font:700 13px var(--sans);letter-spacing:.03em;background:var(--surface2);border-left:3px solid var(--fg);color:var(--fg)}

  /* ===== TABLE ===== */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:10px;border:1px solid var(--border);border-radius:6px}
  table{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface)}
  th,td{padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
  th{background:var(--surface2);color:var(--fg-dim);font-size:11px;letter-spacing:.06em;cursor:pointer;user-select:none;font-weight:700}
  th:hover{color:var(--fg)}
  th.sorted{color:var(--fg)}
  td.col-p1{color:var(--blue);font-weight:600}
  td.col-p2{color:var(--red);font-weight:600}
  td.win{color:var(--fg);font-weight:700}
  td.loss{color:var(--fg-dim)}
  td.draw-c{color:var(--fg-dim)}
  tr:hover td{background:var(--surface2)}

  /* ===== FILTER AREA ===== */
  .filter-area{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:12px;display:flex;flex-direction:column;gap:12px}
  .filter-label{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--fg-dim);margin-bottom:4px}
  .filter-search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--fg);font:13px var(--sans);padding:8px 10px;outline:none;-webkit-appearance:none}
  .filter-search:focus{border-color:var(--fg)}
  .filter-search::placeholder{color:var(--fg-dim)}

  /* NPC名絞り込み行（2列） */
  .filter-npc-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* 勝率行 */
  .filter-wr-row{display:flex;flex-direction:column;gap:6px}
  .filter-wr-inputs{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .filter-wr-inputs .wr-range-label{font-size:11px;color:var(--fg-dim);white-space:nowrap;flex-shrink:0}
  .filter-wr-inputs .wr-sep{font-size:12px;color:var(--fg-dim)}
  /* スライダー */
  .range-group{display:flex;align-items:center;gap:6px;flex:1;min-width:120px}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;min-width:60px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--fg);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--fg);border:none;cursor:pointer}
  /* 数値テキストボックス */
  .wr-num{width:52px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--fg);font:12px var(--mono);padding:5px 7px;outline:none;text-align:center;-moz-appearance:textfield;flex-shrink:0}
  .wr-num::-webkit-inner-spin-button,.wr-num::-webkit-outer-spin-button{-webkit-appearance:none}
  .wr-num:focus{border-color:var(--fg)}
  .wr-unit{font-size:11px;color:var(--fg-dim);flex-shrink:0}

  /* チップ・チェック行 */
  .filter-bottom{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .filter-chip{flex-shrink:0;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--fg-dim);font:12px var(--sans);font-weight:500;cursor:pointer;transition:all .15s}
  .filter-chip.active{background:var(--fg);border-color:var(--fg);color:#181818}
  .filter-chip.draw-chip.active{background:var(--draw);border-color:var(--draw);color:#e8e8e8}
  .result-count{font-size:11px;color:var(--fg-dim);margin-left:auto;white-space:nowrap}

  /* チェックボックス風トグル */
  .check-label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--fg-dim);flex-shrink:0;user-select:none}
  .check-label input[type=checkbox]{width:14px;height:14px;accent-color:var(--fg);cursor:pointer}
  .check-label.active-lbl{color:var(--fg)}

  /* ===== TOAST ===== */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--fg);border:1px solid var(--fg);color:#181818;font:13px var(--sans);padding:9px 16px;border-radius:5px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .safe-bottom{height:env(safe-area-inset-bottom,16px)}

  @media (min-width:640px){
    .panel{padding:32px}
    .npc-grid{gap:24px}
    header{padding:18px 32px}
    .header-top{flex-direction:row;align-items:center;justify-content:space-between;gap:24px}
    .tab-bar{flex-shrink:0}
    .filter-npc-row{grid-template-columns:1fr 1fr 1fr 1fr}
    .filter-wr-inputs{flex-wrap:nowrap}
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="load-spinner"></div>
  <div id="loading-msg">データを読み込んでいます...</div>
</div>

<header>
  <div class="header-top">
    <div>
      <h1>NPC対戦シミュレーター</h1>
      <p id="data-stamp">データ読込中...</p>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showTab('tab-sim')">1対1</button>
      <button class="tab-btn" onclick="showTab('tab-table')">一覧</button>
    </div>
  </div>
</header>

<!-- ========== TAB: 1対1 ========== -->
<div id="tab-sim" class="panel active">
  <div class="section-title">NPC選択</div>
  <div class="npc-grid">
    <div class="npc-col blue">
      <label>NPC 1（先攻）</label>
      <input type="search" class="search-box" id="search-npc1" placeholder="絞り込み" oninput="filterNpc(1)">
      <div class="select-wrapper">
        <select id="sel-npc1"></select>
        <span class="select-arrow">▾</span>
      </div>
    </div>
    <div class="vs-label">VS</div>
    <div class="npc-col red">
      <label>NPC 2（後攻）</label>
      <input type="search" class="search-box" id="search-npc2" placeholder="絞り込み" oninput="filterNpc(2)">
      <div class="select-wrapper">
        <select id="sel-npc2"></select>
        <span class="select-arrow">▾</span>
      </div>
    </div>
  </div>

  <div class="sim-action-row">
    <span class="run-status" id="run-status">NPC を選択して実行</span>
    <button class="btn-ghost" onclick="clearSim()">クリア</button>
    <button class="btn btn-primary" id="btn-run" onclick="runSim()">実行</button>
  </div>

  <div class="result-card" id="result-card">
    <div class="section-title" style="margin-bottom:10px">シミュレーション結果</div>
    <div class="win-bar-wrap">
      <div class="win-seg p1" id="bar-p1" style="width:0%"></div>
      <div class="win-seg draw" id="bar-draw" style="width:0%"></div>
      <div class="win-seg p2" id="bar-p2" style="width:0%"></div>
    </div>
    <div class="bar-labels">
      <span class="lbl-p1" id="lbl-p1">◀ NPC1 勝ち</span>
      <span class="lbl-p2" id="lbl-p2">NPC2 勝ち ▶</span>
    </div>
    <div class="stats-row">
      <div class="stat-chip p1"><span class="num" id="stat-win">-</span><div class="lbl" id="stat-win-lbl">NPC1 勝</div></div>
      <div class="stat-chip"><span class="num" id="stat-draw">-</span><div class="lbl">引分</div></div>
      <div class="stat-chip p2"><span class="num" id="stat-loss">-</span><div class="lbl" id="stat-loss-lbl">NPC2 勝</div></div>
      <div class="stat-chip"><span class="num" id="stat-total">-</span><div class="lbl">総試合</div></div>
    </div>
    <div class="verdict" id="verdict"></div>
  </div>
</div>

<!-- ========== TAB: 一覧 ========== -->
<div id="tab-table" class="panel">
  <div class="section-title">対戦結果一覧</div>

  <div class="filter-area">

    <!-- NPC名絞り込み：いずれかに含む / 両方に含む -->
    <div class="filter-npc-row">
      <div>
        <div class="filter-label">NPC名（いずれかに含む）</div>
        <input type="search" class="filter-search" id="tbl-search-any" placeholder="部分一致" oninput="renderTable()">
      </div>
      <div>
        <div class="filter-label">NPC名（両方に含む）</div>
        <input type="search" class="filter-search" id="tbl-search-both" placeholder="部分一致" oninput="renderTable()">
      </div>
    </div>

    <!-- 勝率範囲：スライダー＋テキストボックス連動 -->
    <div class="filter-wr-row">
      <div class="filter-label">NPC1 勝率範囲</div>
      <div class="filter-wr-inputs">
        <div class="range-group">
          <input type="number" class="wr-num" id="wr-min-num" min="0" max="100" value="0" oninput="onNumChange('min')">
          <span class="wr-unit">%</span>
          <input type="range" id="wr-min-range" min="0" max="100" value="0" oninput="onRangeChange('min')">
        </div>
        <span class="wr-sep">〜</span>
        <div class="range-group">
          <input type="range" id="wr-max-range" min="0" max="100" value="100" oninput="onRangeChange('max')">
          <input type="number" class="wr-num" id="wr-max-num" min="0" max="100" value="100" oninput="onNumChange('max')">
          <span class="wr-unit">%</span>
        </div>
      </div>
    </div>

    <!-- チップフィルタ＋引き分けトグル＋件数 -->
    <div class="filter-bottom">
      <button class="filter-chip active" id="chip-all"  onclick="setWinFilter('all')">全て</button>
      <button class="filter-chip"        id="chip-win"  onclick="setWinFilter('win')">NPC1優勢</button>
      <button class="filter-chip"        id="chip-even" onclick="setWinFilter('even')">互角</button>
      <button class="filter-chip"        id="chip-lose" onclick="setWinFilter('lose')">NPC2優勢</button>
      <label class="check-label" id="draw-check-label" title="引き分け率 0.1% 以上の試合のみ表示">
        <input type="checkbox" id="chk-draw" onchange="renderTable()">
        引き分けあり
      </label>
      <button class="btn-ghost" onclick="resetFilters()">リセット</button>
      <span class="result-count" id="tbl-count"></span>
    </div>
  </div>

  <div class="table-wrap">
    <table id="result-table">
      <thead>
        <tr>
          <th onclick="sortTable('p1')"        id="th-p1">NPC 1</th>
          <th onclick="sortTable('p2')"        id="th-p2">NPC 2</th>
          <th onclick="sortTable('win_rate')"  id="th-wr" class="sorted">勝率 ▲</th>
          <th onclick="sortTable('draw_rate')" id="th-dr">引分率</th>
          <th onclick="sortTable('matchups')"  id="th-mt">試合数</th>
        </tr>
      </thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="safe-bottom"></div>

<script>
// ============================================================
// STATE
// ============================================================
let SIM_DATA = null;
let resultMap = {};
let allEntities = [];
let tableData = [];
let tableSort = { key: 'win_rate', asc: true };
let winFilter = 'all';

// ============================================================
// LOAD
// ============================================================
async function loadSimData() {
  try {
    document.getElementById('loading-msg').textContent = 'sim_data.json を読み込み中...';
    const res = await fetch('sim_data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    SIM_DATA = await res.json();

    allEntities = SIM_DATA.entities || [];
    resultMap = {};
    for (const r of SIM_DATA.results) {
      resultMap[`${r.p1}\t${r.p2}`] = r;
    }

    buildSelects();
    buildTableData();
    renderTable();

    const dt = SIM_DATA.generated_at ? ` (生成: ${SIM_DATA.generated_at})` : '';
    document.getElementById('data-stamp').textContent =
      `${allEntities.length}体 / ${SIM_DATA.results.length}ペア${dt}`;
    document.getElementById('loading-overlay').classList.add('hidden');
  } catch(e) {
    document.getElementById('loading-msg').textContent =
      `読み込み失敗: ${e.message} — sim_data.json をこのHTMLと同じ場所に置いてください`;
  }
}

// ============================================================
// SIM TAB
// ============================================================
function buildSelects() {
  buildOptions(document.getElementById('sel-npc1'), allEntities);
  buildOptions(document.getElementById('sel-npc2'), allEntities);
}

function buildOptions(sel, names) {
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 選択 --</option>';
  for (const n of names) {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    if (n === cur) o.selected = true;
    sel.appendChild(o);
  }
}

function filterNpc(num) {
  const val = document.getElementById(`search-npc${num}`).value.toLowerCase();
  const filtered = val ? allEntities.filter(n => n.toLowerCase().includes(val)) : allEntities;
  buildOptions(document.getElementById(`sel-npc${num}`), filtered);
}

function clearSim() {
  document.getElementById('sel-npc1').value = '';
  document.getElementById('sel-npc2').value = '';
  document.getElementById('search-npc1').value = '';
  document.getElementById('search-npc2').value = '';
  buildOptions(document.getElementById('sel-npc1'), allEntities);
  buildOptions(document.getElementById('sel-npc2'), allEntities);
  document.getElementById('run-status').textContent = 'NPC を選択して実行';
  document.getElementById('result-card').classList.remove('visible');
}

function runSim() {
  if (!SIM_DATA) { toast('データが読み込まれていません'); return; }
  const n1 = document.getElementById('sel-npc1').value;
  const n2 = document.getElementById('sel-npc2').value;
  if (!n1) { toast('NPC 1 を選択してください'); return; }
  if (!n2) { toast('NPC 2 を選択してください'); return; }
  if (n1 === n2) { toast('同じNPCは選択できません'); return; }

  let row = resultMap[`${n1}\t${n2}`];
  let swapped = false;
  if (!row) { row = resultMap[`${n2}\t${n1}`]; swapped = true; }
  if (!row) { toast('このペアはデータに含まれていません'); return; }

  const win  = swapped ? row.loss : row.win;
  const loss = swapped ? row.win  : row.loss;
  const draw = row.draw;
  const matchups = row.matchups;
  const winR  = matchups > 0 ? win  / matchups : 0;
  const drawR = matchups > 0 ? draw / matchups : 0;
  const lossR = matchups > 0 ? loss / matchups : 0;

  const card = document.getElementById('result-card');
  card.classList.add('visible');
  document.getElementById('bar-p1').style.width   = (winR  * 100) + '%';
  document.getElementById('bar-draw').style.width = (drawR * 100) + '%';
  document.getElementById('bar-p2').style.width   = (lossR * 100) + '%';
  document.getElementById('bar-p1').textContent   = winR  > 0.08 ? pct(winR)  : '';
  document.getElementById('bar-draw').textContent = drawR > 0.05 ? pct(drawR) : '';
  document.getElementById('bar-p2').textContent   = lossR > 0.08 ? pct(lossR) : '';
  document.getElementById('lbl-p1').textContent = `◀ ${n1} 勝ち`;
  document.getElementById('lbl-p2').textContent = `${n2} 勝ち ▶`;
  document.getElementById('stat-win').textContent   = win;
  document.getElementById('stat-draw').textContent  = draw;
  document.getElementById('stat-loss').textContent  = loss;
  document.getElementById('stat-total').textContent = matchups;
  document.getElementById('stat-win-lbl').textContent  = n1;
  document.getElementById('stat-loss-lbl').textContent = n2;
  const v = winR > lossR ? `→ 【${n1}】の優勢（勝率 ${pct(winR)}）`
          : lossR > winR ? `→ 【${n2}】の優勢（勝率 ${pct(lossR)}）`
          : '→ 互角';
  document.getElementById('verdict').textContent = v;
  document.getElementById('run-status').textContent = '完了';
}

// ============================================================
// 一覧タブ：勝率スライダー＋テキストボックス連動
// ============================================================
function clampWr(v) { return Math.max(0, Math.min(100, isNaN(v) ? 0 : v)); }

function onRangeChange(side) {
  const rng = document.getElementById(`wr-${side}-range`);
  const num = document.getElementById(`wr-${side}-num`);
  let v = parseInt(rng.value);
  // min > max の場合に相手をずらす
  if (side === 'min') {
    const maxV = parseInt(document.getElementById('wr-max-range').value);
    if (v > maxV) { v = maxV; rng.value = v; }
  } else {
    const minV = parseInt(document.getElementById('wr-min-range').value);
    if (v < minV) { v = minV; rng.value = v; }
  }
  num.value = v;
  renderTable();
}

function onNumChange(side) {
  const num = document.getElementById(`wr-${side}-num`);
  const rng = document.getElementById(`wr-${side}-range`);
  let v = clampWr(parseInt(num.value));
  if (side === 'min') {
    const maxV = parseInt(document.getElementById('wr-max-num').value);
    if (v > maxV) v = maxV;
  } else {
    const minV = parseInt(document.getElementById('wr-min-num').value);
    if (v < minV) v = minV;
  }
  num.value = v;
  rng.value = v;
  renderTable();
}

function resetFilters() {
  document.getElementById('tbl-search-any').value  = '';
  document.getElementById('tbl-search-both').value = '';
  document.getElementById('wr-min-range').value = 0;
  document.getElementById('wr-max-range').value = 100;
  document.getElementById('wr-min-num').value   = 0;
  document.getElementById('wr-max-num').value   = 100;
  document.getElementById('chk-draw').checked = false;
  winFilter = 'all';
  ['all','win','even','lose'].forEach(x =>
    document.getElementById(`chip-${x}`).classList.toggle('active', x === 'all')
  );
  renderTable();
}

// ============================================================
// 一覧タブ：データ構築・描画
// ============================================================
function buildTableData() {
  if (!SIM_DATA) return;

  const qAny  = document.getElementById('tbl-search-any').value.toLowerCase().trim();
  const qBoth = document.getElementById('tbl-search-both').value.toLowerCase().trim();
  const wrMin = parseInt(document.getElementById('wr-min-range').value) / 100;
  const wrMax = parseInt(document.getElementById('wr-max-range').value) / 100;
  const drawOnly = document.getElementById('chk-draw').checked;

  tableData = SIM_DATA.results.filter(r => {
    // NPC名フィルタ（いずれかに含む）
    if (qAny) {
      const inP1 = r.p1.toLowerCase().includes(qAny);
      const inP2 = r.p2.toLowerCase().includes(qAny);
      if (!inP1 && !inP2) return false;
    }
    // NPC名フィルタ（両方に含む）
    if (qBoth) {
      const inP1 = r.p1.toLowerCase().includes(qBoth);
      const inP2 = r.p2.toLowerCase().includes(qBoth);
      if (!inP1 && !inP2) return false;  // 少なくとも一方に含む必要あり
      // 両方に含まれていなくても「いずれかに含む」でOK → 両方必須に変更する場合は以下を有効化
      // if (!inP1 || !inP2) return false;
    }
    // 勝率範囲
    if (r.win_rate < wrMin || r.win_rate > wrMax) return false;
    // 引き分けあり
    if (drawOnly && r.draw_rate < 0.001) return false;
    // 優勢チップ
    if (winFilter === 'win')  return r.win_rate > 0.5;
    if (winFilter === 'lose') return r.win_rate < 0.5;
    if (winFilter === 'even') return Math.abs(r.win_rate - 0.5) < 0.01;
    return true;
  });

  tableData.sort((a, b) => {
    const va = a[tableSort.key] ?? '';
    const vb = b[tableSort.key] ?? '';
    if (va < vb) return tableSort.asc ? -1 : 1;
    if (va > vb) return tableSort.asc ?  1 : -1;
    return 0;
  });
}

function renderTable() {
  buildTableData();
  const tbody = document.getElementById('tbl-body');
  tbody.innerHTML = '';
  for (const r of tableData) {
    const tr = document.createElement('tr');
    const winCls = r.win_rate > 0.5 ? 'win' : (r.win_rate < 0.5 ? 'loss' : 'draw-c');
    tr.innerHTML = `
      <td class="col-p1">${esc(r.p1)}</td>
      <td class="col-p2">${esc(r.p2)}</td>
      <td class="${winCls}">${pct(r.win_rate)}</td>
      <td class="draw-c">${pct(r.draw_rate)}</td>
      <td>${r.matchups}</td>`;
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => {
      document.getElementById('sel-npc1').value = r.p1;
      document.getElementById('sel-npc2').value = r.p2;
      runSim();
      showTab('tab-sim');
    });
    tbody.appendChild(tr);
  }
  document.getElementById('tbl-count').textContent = `${tableData.length}件`;
}

function sortTable(key) {
  if (tableSort.key === key) tableSort.asc = !tableSort.asc;
  else { tableSort.key = key; tableSort.asc = true; }
  const ids    = {p1:'th-p1',p2:'th-p2',win_rate:'th-wr',draw_rate:'th-dr',matchups:'th-mt'};
  const labels = {p1:'NPC 1',p2:'NPC 2',win_rate:'勝率',draw_rate:'引分率',matchups:'試合数'};
  Object.keys(ids).forEach(k => {
    const th = document.getElementById(ids[k]);
    th.textContent = labels[k] + (tableSort.key === k ? (tableSort.asc ? ' ▲' : ' ▼') : '');
    th.className = tableSort.key === k ? 'sorted' : '';
  });
  renderTable();
}

function setWinFilter(f) {
  winFilter = f;
  ['all','win','even','lose'].forEach(x =>
    document.getElementById(`chip-${x}`).classList.toggle('active', x === f)
  );
  renderTable();
}

// ============================================================
// UTIL
// ============================================================
function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = ['tab-sim','tab-table'].indexOf(id);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (id === 'tab-table') renderTable();
}

function pct(v) { return (v * 100).toFixed(1) + '%'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

loadSimData();
</script>
